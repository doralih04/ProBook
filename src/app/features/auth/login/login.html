<div class="login-container">
  <mat-card class="pb-card login-card">
    <mat-card-header>
      <mat-card-title class="pb-title">Iniciar Sesión</mat-card-title>
      <mat-card-subtitle class="pb-subtitle">ProBook - Gestión Hotelera</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="tu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email requerido</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Contraseña requerida</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-message">{{ error }}</div>

        <button mat-raised-button color="primary" class="pb-button full-width" type="submit" [disabled]="loading">
          <mat-icon *ngIf="loading">refresh</mat-icon>
          {{ loading ? 'Iniciando...' : 'Iniciar Sesión' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a></p>
    </mat-card-actions>
  </mat-card>
</div>
