<div class="register-container">
  <mat-card class="pb-card register-card">
    <mat-card-header>
      <mat-card-title class="pb-title">Crear Cuenta</mat-card-title>
      <mat-card-subtitle class="pb-subtitle">Únete a ProBook</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre Completo</mat-label>
          <input matInput formControlName="name" placeholder="Tu nombre">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="registerForm.get('name')?.hasError('required')">Nombre requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="tu@email.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="registerForm.get('email')?.hasError('required')">Email requerido</mat-error>
          <mat-error *ngIf="registerForm.get('email')?.hasError('email')">Email inválido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Rol</mat-label>
          <mat-select formControlName="role">
            <mat-option value="guest">Huésped</mat-option>
            <mat-option value="manager">Gerente</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="registerForm.get('password')?.hasError('required')">Contraseña requerida</mat-error>
          <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirmar Contraseña</mat-label>
          <input matInput formControlName="confirmPassword" type="password">
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="registerForm.hasError('passwordMismatch')">Las contraseñas no coinciden</mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-message">{{ error }}</div>

        <button mat-raised-button color="primary" class="pb-button full-width" type="submit" [disabled]="loading">
          <mat-icon *ngIf="loading">refresh</mat-icon>
          {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a></p>
    </mat-card-actions>
  </mat-card>
</div>
