<div class="dashboard-container">
  <h1 class="pb-title dashboard-title">Dashboard Gerencial</h1>

  <!-- Stats Cards -->
  <mat-grid-list cols="4" rowHeight="120px" class="stats-grid">
    <mat-grid-tile>
      <mat-card class="pb-card stat-card">
        <mat-card-content>
          <div class="stat-value">${{ totalRevenue | number }}</div>
          <div class="stat-label">Ingresos Totales</div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <mat-grid-tile>
      <mat-card class="pb-card stat-card">
        <mat-card-content>
          <div class="stat-value">{{ totalBookings }}</div>
          <div class="stat-label">Reservas</div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <mat-grid-tile>
      <mat-card class="pb-card stat-card">
        <mat-card-content>
          <div class="stat-value">{{ occupancyRate }}%</div>
          <div class="stat-label">Ocupación</div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <mat-grid-tile>
      <mat-card class="pb-card stat-card">
        <mat-card-content>
          <div class="stat-value">{{ availableRooms }}</div>
          <div class="stat-label">Habitaciones Libres</div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>

  <!-- Charts -->
  <mat-grid-list cols="2" rowHeight="400px" class="charts-grid">
    <mat-grid-tile>
      <mat-card class="pb-card chart-card">
        <mat-card-header>
          <mat-card-title>Ingresos Mensuales</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <canvas baseChart
                  [data]="revenueChartData"
                  [options]="revenueChartOptions"
                  [type]="revenueChartType">
          </canvas>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <mat-grid-tile>
      <mat-card class="pb-card chart-card">
        <mat-card-header>
          <mat-card-title>Tasa de Ocupación</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <canvas baseChart
                  [data]="occupancyChartData"
                  [options]="occupancyChartOptions"
                  [type]="occupancyChartType">
          </canvas>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>
</div>
